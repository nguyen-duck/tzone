<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TZone - Compare smartphone specifications side by side. Browse brands, compare devices, and find your perfect phone." />
    <title>TZone - Smartphone Comparison Platform</title>
    <script>
      (function () {
        var key = 'tzone_theme';
        var stored = localStorage.getItem(key);
        var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
